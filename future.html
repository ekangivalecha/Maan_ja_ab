<!DOCTYPE html>
<html>
<head>
    <title>One Last Thing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>One Last Thing</h1>

        <p>
            I’m not asking you to trust me instantly.
        </p>

        <p>
            I’m asking for one chance… to prove I can be better.
        </p>

        <p>
            If you still decide to walk away,
            I’ll respect it.
        </p>

        <p>
            But if there’s even 1% chance left…
            I’m here.
        </p>

        <h2>– Always</h2>
    </div>
</body>
</html>
